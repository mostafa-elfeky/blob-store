<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Store Login</title>
    <style>
        :root {
            --bg: #f4efe5;
            --panel: rgba(255, 252, 246, 0.96);
            --ink: #1f2933;
            --muted: #6b7280;
            --line: rgba(127, 59, 8, 0.14);
            --accent: #bd6f38;
            --accent-dark: #7f3b08;
            --danger: #b42318;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: var(--ink);
            background:
                    radial-gradient(circle at top left, rgba(189, 111, 56, 0.18), transparent 28%),
                    radial-gradient(circle at bottom right, rgba(127, 59, 8, 0.12), transparent 24%),
                    linear-gradient(180deg, #fbf6ef 0%, #f4ecdf 100%);
            padding: 24px;
        }
        .login-shell {
            width: min(460px, 100%);
            display: grid;
            gap: 18px;
            padding: 28px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(68, 43, 24, 0.12);
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 2.8rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }
        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }
        form {
            display: grid;
            gap: 14px;
        }
        .login-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        label {
            display: grid;
            gap: 6px;
            font-weight: 700;
            font-size: 0.92rem;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(127, 59, 8, 0.18);
            background: white;
            font: inherit;
        }
        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .button-secondary {
            background: rgba(255, 255, 255, 0.78);
            color: var(--accent-dark);
            border: 1px solid rgba(127, 59, 8, 0.18);
        }
        .message {
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.9rem;
        }
        .message-error {
            background: rgba(180, 35, 24, 0.08);
            color: var(--danger);
            border: 1px solid rgba(180, 35, 24, 0.14);
        }
        .message-ok {
            background: rgba(37, 100, 61, 0.08);
            color: #25643d;
            border: 1px solid rgba(37, 100, 61, 0.14);
        }
        .docs-modal {
            width: min(1100px, calc(100vw - 32px));
            height: min(88vh, 860px);
            border: 0;
            border-radius: 28px;
            padding: 0;
            background: transparent;
            box-shadow: 0 28px 70px rgba(31, 41, 51, 0.24);
        }
        .docs-modal::backdrop {
            background: rgba(31, 41, 51, 0.45);
            backdrop-filter: blur(5px);
        }
        .docs-modal-shell {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100%;
            border: 1px solid rgba(127, 59, 8, 0.12);
            border-radius: 28px;
            overflow: hidden;
            background: rgba(255, 252, 246, 0.98);
        }
        .docs-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(127, 59, 8, 0.12);
            background: rgba(255, 248, 239, 0.96);
        }
        .docs-modal-header strong {
            font-size: 1rem;
        }
        .docs-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: white;
        }
    </style>
</head>
<body>
<main class="login-shell">
    <div>
        <h1>Admin Login</h1>
        <p>Sign in to manage projects, modules, storage, and system configuration.</p>
    </div>

    <div class="message message-error" th:if="${param.error}">
        Invalid username or password.
    </div>
    <div class="message message-ok" th:if="${param.logout}">
        You have been signed out.
    </div>

    <form th:action="@{/login}" method="post">
        <label>
            Username
            <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <div class="login-actions">
            <button type="submit">Sign In</button>
            <button type="button" class="button-secondary" id="openDocsButton">View Docs</button>
        </div>
    </form>
</main>

<dialog id="docsDialog" class="docs-modal">
    <div class="docs-modal-shell">
        <div class="docs-modal-header">
            <strong>Blob Store Docs</strong>
            <button type="button" class="button-secondary" id="closeDocsButton">Close</button>
        </div>
        <iframe src="/docs" class="docs-frame" title="Blob Store Docs"></iframe>
    </div>
</dialog>

<script>
    const docsDialog = document.getElementById("docsDialog");
    const openDocsButton = document.getElementById("openDocsButton");
    const closeDocsButton = document.getElementById("closeDocsButton");

    function openDocsDialog() {
        if (!docsDialog) {
            return;
        }
        if (typeof docsDialog.showModal === "function") {
            if (!docsDialog.open) {
                docsDialog.showModal();
            }
            return;
        }
        docsDialog.setAttribute("open", "open");
    }

    function closeDocsDialog() {
        if (!docsDialog) {
            return;
        }
        if (typeof docsDialog.close === "function" && docsDialog.open) {
            docsDialog.close();
            return;
        }
        docsDialog.removeAttribute("open");
    }

    if (openDocsButton) {
        openDocsButton.addEventListener("click", openDocsDialog);
    }
    if (closeDocsButton) {
        closeDocsButton.addEventListener("click", closeDocsDialog);
    }
</script>
</body>
</html>

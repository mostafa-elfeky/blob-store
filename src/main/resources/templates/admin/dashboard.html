<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blob Store Admin</title>
    <link rel="stylesheet" th:href="@{/admin/dashboard.css}">
</head>
<body>
<main
        class="layout"
        id="dashboardApp"
        th:attr="data-active-storage-root=${storageSettingsStatus.activeRootDir},
                 data-server-active-tab=${activeTab},
                 data-project-dialog-open=${projectDialogOpen}">
    <section class="hero">
        <div class="hero-top">
            <div class="hero-copy">
                <h1>Blob Store</h1>
            </div>
            <div class="hero-actions">
                <form th:action="@{/logout}" method="post" class="inline-form">
                    <button type="submit" class="button-subtle">Logout</button>
                </form>
            </div>
        </div>
    </section>

    <section class="tab-shell">
        <nav class="tab-bar" aria-label="Dashboard sections">
            <button type="button" class="tab-button is-active" data-tab-target="docs">Docs</button>
            <button type="button" class="tab-button" data-tab-target="database">Database</button>
            <button type="button" class="tab-button" data-tab-target="modules" th:if="${databaseStatus.databaseReady}">Modules</button>
            <button type="button" class="tab-button" data-tab-target="settings">Settings</button>
            <button type="button" class="tab-button" data-tab-target="uploads" th:if="${databaseStatus.databaseReady}">Uploads</button>
            <button type="button" class="tab-button" data-tab-target="logs">Logs</button>
        </nav>

        <th:block th:replace="~{admin/dashboard/fragments/docs-tab :: content}"></th:block>
        <th:block th:replace="~{admin/dashboard/fragments/database-tab :: content}"></th:block>
        <th:block th:replace="~{admin/dashboard/fragments/logs-tab :: content}"></th:block>
        <th:block th:replace="~{admin/dashboard/fragments/modules-tab :: content}"></th:block>
        <th:block th:replace="~{admin/dashboard/fragments/settings-tab :: content}"></th:block>
        <th:block th:replace="~{admin/dashboard/fragments/uploads-tab :: content}"></th:block>
    </section>
</main>

<th:block th:replace="~{admin/dashboard/fragments/project-dialog :: content}"></th:block>
<script th:src="@{/admin/dashboard.js}"></script>
</body>
</html>
